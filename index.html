<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Achievement Planner</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="src/css/style.css">

</head>

<body>

<header class="navbar">

    <div class="container">

        <h1 class="logo">
    <a href="index.html">AchievementPlanner</a>
</h1>

        <nav>

            <a href="#">Games</a>
            <a href="#">Guides</a>
            <a href="#">About</a>

        </nav>

    </div>

</header>

<main>

<section class="hero">

    <div class="container">

        <h2>
    Plan your Steam<br>
    achievements smarter.
</h2>

        <p>
            Discover the fastest and most efficient way to complete every Steam game.
        </p>

        <div class="search-wrapper">

    <input
        type="text"
        placeholder="Search any Steam game..."
    >

    <div class="search-results"></div>

</div>

        <div class="hero-stats">

            <div class="hero-stat">

                <strong>420+</strong>

                <span>Games</span>

            </div>

            <div class="hero-stat">

                <strong>12,000+</strong>

                <span>Achievements</span>

            </div>

            <div class="hero-stat">

                <strong>9,500h</strong>

                <span>Guides</span>

            </div>

        </div>

    </div>

</section>

<section class="popular-games">

    <div class="container">

        <h2>Popular Games</h2>

        <div id="games-container"></div>

    </div>

</section>

</main>

<footer>

    <p>© Achievement Planner</p>

</footer>

<script type="module" src="src/js/app.js"></script>

</body>

</html>
